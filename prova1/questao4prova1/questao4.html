<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Jogador da Copa do Mundo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
      }
      .bg-copa {
        background-image: url("img/FIFA-World-Cup-26.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        backdrop-filter: blur(5px);
        background-color: rgba(255, 255, 255, 0.9);
        border: none;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="bg-copa">
      <div class="d-flex flex-column align-items-center">
        <div class="card" style="width: 22rem" aria-hidden="true">
          <img
            id="jogador"
            src="img/img_.svg"
            class="card-img-top"
            alt="Placeholder Copa"
          />

          <div class="card-body">
            <h5 class="card-title placeholder-glow">
              <span id="Nome" class="placeholder col-6"></span>
              <span id="Rank" class="badge text-bg-secondary">-</span>
            </h5>
            <p class="card-text placeholder-glow">
              <span id="Data_Nas" class="placeholder col-4"></span><br />
              <span id="Altura" class="placeholder col-4"></span><br />
              <span id="Posicao" class="placeholder col-6"></span><br />
            </p>
          </div>
        </div>
        <button onclick="revelar()" class="btn btn-primary">Revelar</button>
      </div>
    </div>

    <script src="js\bootstrap.js"></script>
    <script src="script.js"></script>
  </body>
</html>
